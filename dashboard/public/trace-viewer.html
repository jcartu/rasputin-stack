<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Hierarchical Trace Viewer — Rasputin Nexus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: oklch(0.15 0.01 264);
      --bg-elevated: oklch(0.18 0.015 264);
      --text: oklch(0.95 0.01 264);
      --text-muted: oklch(0.65 0.01 264);
      --border: oklch(0.25 0.01 264);
      --cyan: oklch(0.78 0.22 195);
      --cyan-glow: oklch(0.78 0.22 195 / 0.4);
      --purple: oklch(0.72 0.24 295);
      --green: oklch(0.75 0.20 145);
      --amber: oklch(0.80 0.18 75);
      --red: oklch(0.72 0.25 25);
      --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    label {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    input[type="text"], select {
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px oklch(0.78 0.22 195 / 0.1);
    }
    
    button {
      padding: 8px 16px;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }
    
    button:hover {
      background: var(--purple);
      box-shadow: 0 0 20px var(--cyan-glow);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .trace-container {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 400px;
    }
    
    .trace-item {
      position: relative;
      margin: 8px 0;
      padding: 12px;
      background: oklch(0.20 0.02 264);
      border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .trace-item:hover {
      background: oklch(0.22 0.02 264);
      border-left-color: var(--purple);
      transform: translateX(2px);
    }
    
    .trace-item.expanded {
      border-left-color: var(--green);
    }
    
    .trace-item.tool-call { border-left-color: var(--cyan); }
    .trace-item.agent-message { border-left-color: var(--purple); }
    .trace-item.error { border-left-color: var(--red); }
    .trace-item.thinking { border-left-color: var(--amber); }
    
    .trace-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 3px;
      height: 100%;
      background: inherit;
      border-left: inherit;
      transform: translateY(-50%);
    }
    
    .trace-children {
      margin-left: 30px;
      border-left: 1px dashed var(--border);
      padding-left: 15px;
      display: none;
    }
    
    .trace-item.expanded + .trace-children {
      display: block;
    }
    
    .trace-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    
    .expand-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    
    .trace-item.expanded .expand-icon {
      transform: rotate(90deg);
    }
    
    .trace-type {
      display: inline-block;
      padding: 2px 8px;
      background: oklch(0.25 0.02 264);
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .trace-name {
      font-weight: 700;
      color: var(--cyan);
      flex: 1;
    }
    
    .trace-timing {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .duration {
      padding: 2px 6px;
      background: oklch(0.25 0.02 264);
      border-radius: 4px;
      font-weight: 600;
    }
    
    .duration.fast { color: var(--green); }
    .duration.medium { color: var(--amber); }
    .duration.slow { color: var(--red); }
    
    .trace-details {
      margin-top: 8px;
      padding: 8px;
      background: oklch(0.17 0.01 264);
      border-radius: 4px;
      font-size: 0.8rem;
      color: var(--text-muted);
      max-height: 200px;
      overflow-y: auto;
    }
    
    .trace-waterfall {
      margin-top: 10px;
      height: 6px;
      background: oklch(0.25 0.02 264);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }
    
    .waterfall-bar {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      border-radius: 3px;
      opacity: 0.7;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: var(--text);
    }
    
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: oklch(0.20 0.02 264);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-wrap: wrap;
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--cyan);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Hierarchical Trace Viewer</h1>
      <p class="subtitle">
        Visualize nested tool calls, agent interactions, and execution flow with hierarchical traces
      </p>
    </header>
    
    <div class="controls">
      <div class="control-group">
        <label for="sessionSelect">Session:</label>
        <select id="sessionSelect">
          <option value="">Select a session...</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="filterType">Filter:</label>
        <select id="filterType">
          <option value="all">All Events</option>
          <option value="tool-call">Tool Calls Only</option>
          <option value="agent-message">Agent Messages</option>
          <option value="thinking">Thinking Steps</option>
          <option value="error">Errors Only</option>
        </select>
      </div>
      
      <button id="loadBtn" disabled>Load Trace</button>
      <button id="expandAllBtn">Expand All</button>
      <button id="collapseAllBtn">Collapse All</button>
    </div>
    
    <div id="statsBar" class="stats-bar" style="display: none;">
      <div class="stat">
        <span class="stat-label">Total Events</span>
        <span class="stat-value" id="statTotal">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Tool Calls</span>
        <span class="stat-value" id="statTools">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Max Depth</span>
        <span class="stat-value" id="statDepth">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Duration</span>
        <span class="stat-value" id="statDuration">0ms</span>
      </div>
    </div>
    
    <div class="trace-container" id="traceContainer">
      <div class="empty-state">
        <h3>No Trace Loaded</h3>
        <p>Select a session and click "Load Trace" to visualize the execution hierarchy</p>
      </div>
    </div>
  </div>
  
  <script>
    // API endpoints
    const API_BASE = window.location.origin;
    
    // State
    let currentTrace = [];
    let currentFilter = 'all';
    
    // Initialize
    async function init() {
      await loadSessions();
      setupEventListeners();
    }
    
    // Load available sessions
    async function loadSessions() {
      try {
        const response = await fetch(`${API_BASE}/api/sessions`);
        const sessions = await response.json();
        
        const select = document.getElementById('sessionSelect');
        select.innerHTML = '<option value="">Select a session...</option>';
        
        sessions.forEach(session => {
          const option = document.createElement('option');
          option.value = session.key;
          option.textContent = `${session.label || session.key} (${new Date(session.lastActive).toLocaleString()})`;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load sessions:', error);
      }
    }
    
    // Setup event listeners
    function setupEventListeners() {
      document.getElementById('sessionSelect').addEventListener('change', (e) => {
        document.getElementById('loadBtn').disabled = !e.target.value;
      });
      
      document.getElementById('loadBtn').addEventListener('click', loadTrace);
      document.getElementById('expandAllBtn').addEventListener('click', () => expandAll(true));
      document.getElementById('collapseAllBtn').addEventListener('click', () => expandAll(false));
      document.getElementById('filterType').addEventListener('change', (e) => {
        currentFilter = e.target.value;
        renderTrace();
      });
    }
    
    // Load trace for selected session
    async function loadTrace() {
      const sessionKey = document.getElementById('sessionSelect').value;
      if (!sessionKey) return;
      
      const container = document.getElementById('traceContainer');
      container.innerHTML = '<div class="loading"><span class="spinner"></span>Loading trace data...</div>';
      
      try {
        const response = await fetch(`${API_BASE}/api/trace/${encodeURIComponent(sessionKey)}`);
        const data = await response.json();
        
        currentTrace = buildHierarchy(data.events || []);
        renderTrace();
        updateStats();
      } catch (error) {
        console.error('Failed to load trace:', error);
        container.innerHTML = `
          <div class="empty-state">
            <h3>Failed to Load Trace</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }
    
    // Build hierarchical structure from flat events
    function buildHierarchy(events) {
      // For now, simulate hierarchy based on timing and type
      // In production, events would have parent_id fields
      const hierarchy = [];
      let stack = [];
      
      events.forEach((event, index) => {
        const depth = calculateDepth(event, events, index);
        event.depth = depth;
        event.children = [];
        
        // Assign to parent based on depth
        if (depth === 0) {
          hierarchy.push(event);
          stack = [event];
        } else if (depth > 0 && stack.length > 0) {
          const parent = stack[stack.length - 1];
          if (parent) {
            parent.children.push(event);
          }
          if (event.type === 'tool-call-start') {
            stack.push(event);
          }
        }
        
        // Pop stack on completions
        if (event.type === 'tool-call-end' && stack.length > 1) {
          stack.pop();
        }
      });
      
      return hierarchy;
    }
    
    // Calculate depth based on context (heuristic for demo)
    function calculateDepth(event, allEvents, index) {
      // This is a simplified heuristic
      // Real implementation would use parent_id from backend
      if (event.type === 'user-message') return 0;
      if (event.type === 'agent-response') return 0;
      if (event.type === 'tool-call') return 1;
      if (event.type === 'thinking') return 1;
      
      // Look backwards for context
      for (let i = index - 1; i >= 0; i--) {
        if (allEvents[i].type === 'tool-call') return 2;
      }
      
      return 1;
    }
    
    // Render hierarchical trace
    function renderTrace() {
      const container = document.getElementById('traceContainer');
      
      if (currentTrace.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Events Found</h3>
            <p>This session has no trace data</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = '';
      currentTrace.forEach(event => {
        renderTraceItem(event, container);
      });
    }
    
    // Render individual trace item
    function renderTraceItem(event, parentElement, depth = 0) {
      // Apply filter
      if (currentFilter !== 'all' && event.type !== currentFilter) {
        return;
      }
      
      const item = document.createElement('div');
      item.className = `trace-item ${event.type}`;
      item.dataset.depth = depth;
      
      const hasChildren = event.children && event.children.length > 0;
      if (hasChildren) {
        item.classList.add('has-children');
      }
      
      // Duration formatting
      const duration = event.duration || 0;
      let durationClass = 'fast';
      if (duration > 1000) durationClass = 'slow';
      else if (duration > 500) durationClass = 'medium';
      
      item.innerHTML = `
        <div class="trace-header">
          ${hasChildren ? '<span class="expand-icon">▶</span>' : '<span class="expand-icon" style="opacity:0">▶</span>'}
          <span class="trace-type">${event.type.replace('-', ' ')}</span>
          <span class="trace-name">${event.name || event.tool || 'Event'}</span>
          <div class="trace-timing">
            <span class="duration ${durationClass}">${formatDuration(duration)}</span>
            <span>${new Date(event.timestamp).toLocaleTimeString()}</span>
          </div>
        </div>
        ${event.details ? `<div class="trace-details">${formatDetails(event.details)}</div>` : ''}
        ${duration > 0 ? renderWaterfall(event, depth) : ''}
      `;
      
      parentElement.appendChild(item);
      
      // Children container
      if (hasChildren) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'trace-children';
        parentElement.appendChild(childrenContainer);
        
        event.children.forEach(child => {
          renderTraceItem(child, childrenContainer, depth + 1);
        });
        
        // Toggle expand/collapse
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          item.classList.toggle('expanded');
        });
      }
    }
    
    // Render waterfall timing bar
    function renderWaterfall(event, depth) {
      const maxDuration = Math.max(...currentTrace.map(e => e.duration || 0));
      const width = ((event.duration || 0) / maxDuration) * 100;
      
      return `
        <div class="trace-waterfall">
          <div class="waterfall-bar" style="width: ${width}%; left: ${depth * 5}%;"></div>
        </div>
      `;
    }
    
    // Format duration
    function formatDuration(ms) {
      if (ms < 1) return '<1ms';
      if (ms < 1000) return `${Math.round(ms)}ms`;
      return `${(ms / 1000).toFixed(2)}s`;
    }
    
    // Format details object
    function formatDetails(details) {
      if (typeof details === 'string') return details;
      return JSON.stringify(details, null, 2);
    }
    
    // Expand/collapse all
    function expandAll(expand) {
      document.querySelectorAll('.trace-item.has-children').forEach(item => {
        if (expand) {
          item.classList.add('expanded');
        } else {
          item.classList.remove('expanded');
        }
      });
    }
    
    // Update statistics
    function updateStats() {
      const statsBar = document.getElementById('statsBar');
      statsBar.style.display = 'flex';
      
      let totalEvents = 0;
      let toolCalls = 0;
      let maxDepth = 0;
      let totalDuration = 0;
      
      function traverse(events, depth = 0) {
        events.forEach(event => {
          totalEvents++;
          maxDepth = Math.max(maxDepth, depth);
          if (event.type === 'tool-call') toolCalls++;
          if (event.duration) totalDuration = Math.max(totalDuration, event.timestamp + event.duration);
          
          if (event.children) traverse(event.children, depth + 1);
        });
      }
      
      traverse(currentTrace);
      
      document.getElementById('statTotal').textContent = totalEvents;
      document.getElementById('statTools').textContent = toolCalls;
      document.getElementById('statDepth').textContent = maxDepth;
      document.getElementById('statDuration').textContent = formatDuration(totalDuration);
    }
    
    // Initialize on load
    init();
  </script>
</body>
</html>
