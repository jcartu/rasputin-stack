<!DOCTYPE html>
<html><head>
<title>ALFIE Upload</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0e0; font-family:system-ui; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.drop-zone {
  width:80vw; height:60vh; border:3px dashed #444; border-radius:20px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  transition: all 0.3s; cursor:pointer; position:relative;
}
.drop-zone.over { border-color:#00d4ff; background:rgba(0,212,255,0.05); }
.drop-zone h1 { font-size:2rem; margin-bottom:1rem; }
.drop-zone p { color:#888; font-size:1.1rem; }
input[type=file] { display:none; }
.progress { margin-top:2rem; width:60%; }
.progress-bar { height:8px; background:#222; border-radius:4px; overflow:hidden; margin-top:0.5rem; }
.progress-fill { height:100%; background:linear-gradient(90deg,#00d4ff,#7b61ff); width:0%; transition:width 0.3s; }
.status { margin-top:1rem; font-size:0.9rem; color:#aaa; max-height:300px; overflow-y:auto; }
.status .done { color:#4ade80; }
.status .err { color:#f87171; }
</style>
</head><body>
<div class="drop-zone" id="dz">
  <h1>Drop files here</h1>
  <p>ChatGPT export, Google Photos, any size — click or drag</p>
  <input type="file" id="fi" multiple>
  <div class="progress" id="prog" style="display:none">
    <div id="ptext">Uploading...</div>
    <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
  </div>
  <div class="status" id="status"></div>
</div>
<script>
const dz=document.getElementById('dz'), fi=document.getElementById('fi'),
      prog=document.getElementById('prog'), pfill=document.getElementById('pfill'),
      ptext=document.getElementById('ptext'), status=document.getElementById('status');

dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>handleFiles(e.target.files));

async function handleFiles(files){
  prog.style.display='block';
  for(let i=0;i<files.length;i++){
    const f=files[i];
    ptext.textContent=`Uploading ${f.name} (${(f.size/1048576).toFixed(1)}MB) — ${i+1}/${files.length}`;
    pfill.style.width='0%';
    try{
      const form=new FormData();
      form.append('file',f);
      const xhr=new XMLHttpRequest();
      xhr.upload.onprogress=e=>{if(e.lengthComputable)pfill.style.width=(e.loaded/e.total*100)+'%'};
      await new Promise((res,rej)=>{
        xhr.onload=()=>xhr.status<400?res():rej(xhr.statusText);
        xhr.onerror=()=>rej('Network error');
        xhr.open('POST','/api/upload-open?name='+encodeURIComponent(f.name));
        xhr.send(f);
      });
      status.innerHTML+=`<div class="done">✅ ${f.name} uploaded</div>`;
    }catch(e){
      status.innerHTML+=`<div class="err">❌ ${f.name}: ${e}</div>`;
    }
  }
  ptext.textContent='All done!';
  pfill.style.width='100%';
}
</script>
</body></html>
