<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasputin Nexus — Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* Animated Background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 25% 50%, oklch(0.12 0.06 240/0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 30%, oklch(0.10 0.04 195/0.2) 0%, transparent 50%);
  z-index: -1;
  animation: bgShift 20s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-3%, 3%); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:oklch(0.08 0.015 265/0.35);backdrop-filter:blur(10px) saturate(150%);border-bottom:1px solid oklch(0.38 0.04 270/0.15);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.topbar::-webkit-scrollbar{display:none}
.topbar-logo{font-size:16px;font-weight:700;background:linear-gradient(135deg,oklch(0.68 0.30 290),oklch(0.78 0.22 195));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;text-decoration:none;font-family:'Space Grotesk',system-ui,sans-serif}
.topbar-nav{display:flex;gap:6px;margin-left:8px;flex-wrap:nowrap}
.topbar-nav a{font-size:11.5px;padding:5px 11px;border:1px solid oklch(0.25 0.02 280/0.6);border-radius:20px;transition:all .2s;color:oklch(0.65 0.06 280);text-decoration:none;white-space:nowrap;background:oklch(0.12 0.01 280/0.4);font-family:'Space Grotesk',system-ui,sans-serif}
.topbar-nav a:hover{color:oklch(0.90 0.15 195);border-color:oklch(0.60 0.15 195/0.6);background:oklch(0.18 0.04 195/0.3);box-shadow:0 0 12px oklch(0.60 0.15 195/0.15);transform:translateY(-1px)}
.topbar-nav a.active{color:oklch(0.90 0.15 195);border-color:oklch(0.60 0.15 195/0.5);background:oklch(0.18 0.04 195/0.2)}
.topbar-spacer{flex:1}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: oklch(0.06 0.01 270);
  color: oklch(0.98 0.005 270);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Search in topbar */
.search-wrap { position: relative; }
.search-wrap input {
  background: oklch(0.11 0.02 270);
  border: 1px solid oklch(0.25 0.02 280/0.6);
  border-radius: 8px;
  padding: 8px 14px 8px 38px;
  color: oklch(0.98 0.005 270);
  font-family: inherit;
  font-size: 13px;
  width: 280px;
  outline: none;
  transition: all 0.3s;
}
.search-wrap input:focus { 
  border-color: oklch(0.78 0.22 195); 
  box-shadow: 0 0 0 3px oklch(0.78 0.22 195/0.1);
  width: 320px;
}
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: oklch(0.52 0.012 270);
}

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: oklch(0.72 0.012 270);
}
.breadcrumb span { cursor: pointer; transition: color 0.2s; }
.breadcrumb span:hover { color: oklch(0.78 0.22 195); }
.breadcrumb .bc-sep { color: oklch(0.48 0.018 270); cursor: default; }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: oklch(0.11 0.02 270/0.6);
  backdrop-filter: blur(12px);
  border-right: 1px solid oklch(0.25 0.02 280/0.6);
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: oklch(0.25 0.02 280/0.6); border-radius: 3px; }

/* Compact stats bar */
.sidebar-stats {
  padding: 10px 14px;
  border-bottom: 1px solid oklch(0.25 0.02 280/0.3);
  font-size: 11px;
  color: oklch(0.62 0.012 270);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  background: oklch(0.08 0.015 265/0.5);
  font-family: 'JetBrains Mono', monospace;
}
.sidebar-stats span { 
  display: flex; 
  align-items: center; 
  gap: 4px;
  white-space: nowrap;
}
.sidebar-stats span b { 
  color: oklch(0.78 0.22 195); 
  font-weight: 600;
}

.sidebar-tree {
  flex: 1;
  padding: 4px 0;
}

.tree-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 13px;
  color: oklch(0.72 0.012 270);
  transition: all 0.2s ease;
  user-select: none;
  position: relative;
  border-left: 2px solid transparent;
}

.tree-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: oklch(0.78 0.22 195);
  transform: scaleY(0);
  transition: transform 0.2s ease;
}

.tree-item:hover { 
  background: oklch(0.08 0.015 265/0.7); 
  color: oklch(0.98 0.005 270);
}

.tree-item:hover::before {
  transform: scaleY(1);
}

.tree-item.active { 
  background: oklch(0.18 0.04 195/0.25); 
  color: oklch(0.98 0.005 270);
  border-left-color: oklch(0.78 0.22 195);
}

.tree-item .icon { 
  font-size: 16px; 
  width: 20px; 
  text-align: center; 
  flex-shrink: 0;
}

.tree-item .name { 
  flex: 1;
  overflow: hidden; 
  text-overflow: ellipsis; 
  white-space: nowrap;
}

.tree-item .size {
  font-size: 10px;
  color: oklch(0.52 0.012 270);
  margin-left: auto;
  padding-left: 8px;
}

.tree-item .arrow {
  font-size: 10px;
  width: 16px;
  text-align: center;
  transition: transform 0.25s ease;
  flex-shrink: 0;
  color: oklch(0.52 0.012 270);
}

.tree-item .arrow.open { 
  transform: rotate(90deg);
  color: oklch(0.78 0.22 195);
}

.tree-children { 
  display: none;
  animation: fadeIn 0.3s ease;
}

.tree-children.open { 
  display: block;
}

.tree-item.hidden { 
  display: none;
}

.tree-item.has-children.expanded::after {
  content: '';
  position: absolute;
  left: 20px;
  top: 28px;
  bottom: -4px;
  width: 1px;
  background: oklch(0.25 0.02 280/0.4);
}

/* Viewer */
.viewer {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
}
.viewer::-webkit-scrollbar { width: 8px; }
.viewer::-webkit-scrollbar-thumb { background: oklch(0.25 0.02 280/0.6); border-radius: 4px; }

/* Empty State - Clean, no illustration */
.viewer-empty {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-top: 32px;
  gap: 28px;
  animation: fadeIn 0.5s ease;
  max-width: 900px;
}

.empty-title h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
  color: oklch(0.82 0.012 270);
}

.empty-title p {
  font-size: 13px;
  color: oklch(0.62 0.012 270);
  line-height: 1.6;
}

/* Quick Access Cards - file preview style */
.quick-access {
  width: 100%;
}

.quick-access h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 14px;
  color: oklch(0.72 0.012 270);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 11px;
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.quick-card {
  background: oklch(0.11 0.02 270/0.5);
  border: 1px solid oklch(0.25 0.02 280/0.5);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.quick-card:hover {
  border-color: oklch(0.78 0.22 195/0.6);
  box-shadow: 0 2px 12px oklch(0.78 0.22 195/0.15), 0 0 0 1px oklch(0.78 0.22 195/0.3);
  background: oklch(0.13 0.03 270/0.6);
}

.quick-card .name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: oklch(0.98 0.005 270);
  display: flex;
  align-items: center;
  gap: 8px;
}

.quick-card .icon {
  font-size: 16px;
  opacity: 0.7;
}

.quick-card .preview {
  font-size: 11px;
  color: oklch(0.62 0.012 270);
  line-height: 1.5;
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* Recent Files */
.recent-files {
  width: 100%;
}

.recent-files h3 {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 14px;
  color: oklch(0.72 0.012 270);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.recent-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.recent-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: oklch(0.11 0.02 270/0.4);
  border: 1px solid oklch(0.25 0.02 280/0.4);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.recent-item:hover {
  background: oklch(0.14 0.04 195/0.25);
  border-color: oklch(0.78 0.22 195/0.5);
  box-shadow: 0 2px 8px oklch(0.78 0.22 195/0.1);
}

.recent-item .icon {
  font-size: 18px;
  opacity: 0.8;
}

.recent-item .info {
  flex: 1;
}

.recent-item .name {
  font-size: 13px;
  font-weight: 500;
  color: oklch(0.98 0.005 270);
  margin-bottom: 2px;
}

.recent-item .meta {
  font-size: 11px;
  color: oklch(0.62 0.012 270);
  font-family: 'JetBrains Mono', monospace;
}

/* File Meta */
.file-meta {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  background: oklch(0.11 0.02 270/0.5);
  border-radius: 10px;
  margin-bottom: 24px;
  font-size: 12px;
  color: oklch(0.72 0.012 270);
  flex-wrap: wrap;
  border: 1px solid oklch(0.25 0.02 280/0.4);
  animation: fadeIn 0.4s ease;
}
.file-meta .tag { 
  display: flex; 
  align-items: center; 
  gap: 6px;
  padding: 4px 10px;
  background: oklch(0.08 0.015 265/0.5);
  border-radius: 6px;
  transition: all 0.2s ease;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.file-meta .tag:hover {
  background: oklch(0.14 0.04 195/0.3);
  color: oklch(0.98 0.005 270);
}

/* Markdown Content */
.md-content { 
  line-height: 1.7; 
  font-size: 15px;
  animation: fadeIn 0.5s ease;
}

.md-content h1 { 
  font-size: 32px; 
  font-weight: 700; 
  margin: 36px 0 20px; 
  color: oklch(0.78 0.22 195); 
  border-bottom: 2px solid oklch(0.25 0.02 280/0.6); 
  padding-bottom: 12px;
  background: linear-gradient(135deg, oklch(0.78 0.22 195), oklch(0.68 0.30 290));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.md-content h2 { 
  font-size: 24px; 
  font-weight: 600; 
  margin: 32px 0 16px;
  color: oklch(0.88 0.15 195);
}

.md-content h3 { 
  font-size: 20px; 
  font-weight: 600; 
  margin: 28px 0 12px;
  color: oklch(0.82 0.12 195);
}

.md-content h4 { 
  font-size: 17px; 
  font-weight: 600; 
  margin: 24px 0 10px;
  color: oklch(0.78 0.10 195);
}

.md-content p { margin: 12px 0; }

.md-content ul, .md-content ol { 
  margin: 12px 0; 
  padding-left: 28px; 
}

.md-content li { 
  margin: 6px 0;
  line-height: 1.6;
}

.md-content a { 
  color: oklch(0.78 0.22 195); 
  text-decoration: none;
  border-bottom: 1px solid oklch(0.78 0.22 195/0.3);
  transition: all 0.2s ease;
}

.md-content a:hover { 
  border-bottom-color: oklch(0.78 0.22 195);
  color: oklch(0.88 0.25 195);
}

.md-content blockquote {
  border-left: 3px solid oklch(0.78 0.22 195);
  padding: 12px 20px;
  margin: 16px 0;
  background: oklch(0.11 0.02 270/0.6);
  backdrop-filter: blur(8px);
  border-radius: 0 10px 10px 0;
  color: oklch(0.82 0.012 270);
  font-style: italic;
}

.md-content code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: oklch(0.11 0.02 270/0.8);
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid oklch(0.25 0.02 280/0.4);
}

.md-content pre { 
  margin: 20px 0; 
  border-radius: 12px; 
  overflow: hidden;
  position: relative;
  border: 1px solid oklch(0.25 0.02 280/0.6);
  box-shadow: 0 4px 12px oklch(0/0.5);
}

.md-content pre code {
  display: block;
  padding: 20px;
  background: oklch(0.08 0.015 265);
  border-radius: 0;
  line-height: 1.6;
  border: none;
  overflow-x: auto;
}

.md-content pre:hover {
  box-shadow: 0 6px 20px oklch(0.78 0.22 195/0.1);
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 6px 12px;
  background: oklch(0.18 0.04 195/0.4);
  backdrop-filter: blur(8px);
  border: 1px solid oklch(0.38 0.04 270/0.4);
  border-radius: 6px;
  color: oklch(0.98 0.005 270);
  font-size: 11px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s ease;
  font-family: 'Space Grotesk', sans-serif;
}

.md-content pre:hover .copy-btn {
  opacity: 1;
}

.copy-btn:hover {
  background: oklch(0.78 0.22 195/0.3);
  border-color: oklch(0.78 0.22 195);
}

.copy-btn.copied {
  background: oklch(0.60 0.15 140/0.4);
  border-color: oklch(0.60 0.15 140);
}

.md-content table { 
  border-collapse: collapse; 
  margin: 20px 0; 
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid oklch(0.25 0.02 280/0.6);
}

.md-content th, .md-content td {
  border: 1px solid oklch(0.25 0.02 280/0.4);
  padding: 10px 14px;
  text-align: left;
  font-size: 13px;
}

.md-content th { 
  background: oklch(0.14 0.04 195/0.3); 
  font-weight: 600;
  color: oklch(0.98 0.005 270);
}

.md-content tr:hover {
  background: oklch(0.11 0.02 270/0.5);
}

.md-content hr { 
  border: none; 
  border-top: 1px solid oklch(0.25 0.02 280/0.6); 
  margin: 32px 0;
}

.md-content img { 
  max-width: 100%; 
  border-radius: 10px;
  border: 1px solid oklch(0.25 0.02 280/0.5);
  margin: 16px 0;
}

/* Raw text */
.raw-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  background: oklch(0.11 0.02 270/0.6);
  backdrop-filter: blur(12px);
  padding: 24px;
  border-radius: 12px;
  border: 1px solid oklch(0.25 0.02 280/0.6);
  animation: fadeIn 0.5s ease;
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-logo">RASPUTIN NEXUS</a>
  <div class="topbar-nav">
    <a href="/">Dashboard</a>
    <a href="/browser.html">Browser</a>
    <a href="/execute.html">Execute</a>
    <a href="/research.html">Research</a>
    <a href="/playground.html">Playground</a>
    <a href="/council.html">Council</a>
    <a href="/replay.html">Replay</a>
    <a href="/agents.html">Agents</a>
    <a href="/knowledge.html" class="active">Knowledge</a>
    <a href="/templates.html">Templates</a>
    <a href="/remote.html">Remote</a>
  </div>
  <div class="topbar-spacer"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="search-wrap">
    <input type="text" id="topSearch" placeholder="Search files..." oninput="renderTree()">
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-stats" id="sidebarStats">
      Loading...
    </div>
    <div class="sidebar-tree" id="sidebarTree"></div>
  </div>
  
  <div class="viewer" id="viewer">
    <div class="viewer-empty">
      <div class="empty-title">
        <h2>Knowledge Base</h2>
        <p>Select a file from the sidebar to view its contents, or start typing to search.</p>
      </div>
      
      <div class="quick-access">
        <h3>Quick Access</h3>
        <div class="quick-grid" id="quickGrid"></div>
      </div>

      <div class="recent-files">
        <h3>Recent Files</h3>
        <div class="recent-list" id="recentList"></div>
      </div>
    </div>
  </div>
</div>

<script>
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

let treeData = [];
let activeFilePath = null;
let fileCount = 0;
let dirCount = 0;
let totalWords = 0;
let totalSize = 0;
let allFiles = [];
let quickAccessFiles = ['README.md', 'MEMORY.md', 'AGENTS.md', 'TOOLS.md', 'SOUL.md', 'USER.md'];
let defaultFile = null;

async function loadTree() {
  try {
    const res = await fetch('/api/knowledge', { credentials: 'include' });
    const data = await res.json();
    treeData = data.tree || [];
    
    fileCount = 0;
    dirCount = 0;
    totalWords = 0;
    totalSize = 0;
    allFiles = [];
    
    countItems(treeData);
    
    document.getElementById('sidebarStats').textContent = `${dirCount} folders · ${fileCount} files · ${humanSize(totalSize)}`;
    
    renderTree();
    renderQuickAccess();
    renderRecentFiles();
    
    // Auto-expand first level
    document.querySelectorAll('.tree-item.has-children').forEach((item, idx) => {
      if (item.style.paddingLeft === '12px' && idx < 3) {
        item.click();
      }
    });
    
    // Load default file if none selected
    if (!activeFilePath && defaultFile) {
      loadFile(defaultFile);
    }
  } catch (e) {
    document.getElementById('sidebarStats').textContent = 'Failed to load';
    document.getElementById('sidebarTree').innerHTML = '<div style="padding:20px;text-align:center;color:oklch(0.72 0.012 270);font-size:12px">Could not load workspace files. Check API connection.</div>';
  }
}

function countItems(nodes, path = []) {
  for (const n of nodes) {
    if (n.type === 'dir') {
      dirCount++;
      if (n.children) countItems(n.children, [...path, n.name]);
    } else {
      fileCount++;
      const filePath = [...path, n.name].join('/');
      allFiles.push({
        path: filePath,
        name: n.name,
        size: n.size || 0,
        modified: n.modified || 0,
      });
      if (n.size) totalSize += n.size;
      if (n.wordCount) totalWords += n.wordCount;
      
      // Set default file
      if (!defaultFile && (n.name === 'README.md' || n.name === 'MEMORY.md')) {
        defaultFile = filePath;
      }
    }
  }
}

function renderTree() {
  const container = document.getElementById('sidebarTree');
  container.innerHTML = '';
  const q = document.getElementById('topSearch').value.toLowerCase();
  
  for (const dir of treeData) {
    container.appendChild(buildTreeNode(dir, [dir.name], q));
  }
  
  if (treeData.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:oklch(0.72 0.012 270);font-size:12px">Workspace empty or loading...</div>';
  }
}

function buildTreeNode(node, pathParts, query, depth = 0) {
  const frag = document.createDocumentFragment();

  if (node.type === 'dir') {
    const item = document.createElement('div');
    const hasChildren = node.children && node.children.length > 0;
    item.className = 'tree-item' + (hasChildren ? ' has-children' : '');
    item.style.paddingLeft = (12 + depth * 20) + 'px';
    
    const arrowHtml = hasChildren ? '<span class="arrow">▶</span>' : '<span style="width:16px;display:inline-block"></span>';
    item.innerHTML = arrowHtml + '<span class="icon">📁</span><span class="name">' + esc(node.name) + '</span>';

    const childContainer = document.createElement('div');
    childContainer.className = 'tree-children';

    let hasVisibleChild = false;
    if (node.children) {
      for (const child of node.children) {
        const childPath = [...pathParts, child.name];
        const el = buildTreeNode(child, childPath, query, depth + 1);
        childContainer.appendChild(el);
        
        if (el.querySelector && !el.querySelector('.tree-item')?.classList.contains('hidden')) {
          hasVisibleChild = true;
        }
        if (el.nodeType === 11) {
          for (const c of el.children) {
            if (c.classList && !c.classList.contains('hidden')) hasVisibleChild = true;
          }
        }
      }
    }

    if (query && !hasVisibleChild) {
      item.classList.add('hidden');
    }
    
    if (query && hasVisibleChild && hasChildren) {
      childContainer.classList.add('open');
      item.querySelector('.arrow')?.classList.add('open');
      item.classList.add('expanded');
    }

    if (hasChildren) {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        childContainer.classList.toggle('open');
        const arrow = item.querySelector('.arrow');
        if (arrow) {
          arrow.classList.toggle('open');
          item.classList.toggle('expanded');
        }
      });
    }

    frag.appendChild(item);
    frag.appendChild(childContainer);
  } else {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.paddingLeft = (12 + depth * 20) + 'px';
    const icon = getFileIcon(node.name);
    const size = node.size ? '<span class="size">' + humanSize(node.size) + '</span>' : '';
    item.innerHTML = '<span style="width:16px;display:inline-block"></span><span class="icon">' + icon + '</span><span class="name">' + esc(node.name) + '</span>' + size;
    item.dataset.path = pathParts.join('/');

    if (query && !node.name.toLowerCase().includes(query)) {
      item.classList.add('hidden');
    }

    item.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      loadFile(pathParts.join('/'));
    });

    frag.appendChild(item);
  }

  return frag;
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = { 
    md: '📄', 
    json: '📊', 
    yaml: '⚙', 
    yml: '⚙', 
    py: '🐍', 
    sh: '🔧', 
    js: '📜', 
    ts: '🔷', 
    txt: '📄', 
    log: '📊', 
    toml: '⚙', 
    html: '🌐', 
    css: '🎨' 
  };
  return map[ext] || '📄';
}

async function renderQuickAccess() {
  const grid = document.getElementById('quickGrid');
  grid.innerHTML = '';
  
  const descriptions = {
    'README.md': 'Project overview and getting started',
    'MEMORY.md': 'Long-term memory and context',
    'AGENTS.md': 'Agent behavior and workspace rules',
    'TOOLS.md': 'Local setup and configurations',
    'SOUL.md': 'Identity and core values',
    'USER.md': 'Information about your human',
  };
  
  for (const fileName of quickAccessFiles) {
    const found = allFiles.find(f => f.name === fileName);
    if (!found) continue;
    
    // Fetch first 2 lines for preview
    let preview = descriptions[fileName] || 'Quick access file';
    try {
      const res = await fetch('/api/knowledge/' + encodeURIComponent(found.path), { credentials: 'include' });
      const data = await res.json();
      if (data.content) {
        const lines = data.content.split('\n').filter(l => l.trim()).slice(0, 2);
        if (lines.length > 0) {
          preview = lines.join(' ').slice(0, 120);
        }
      }
    } catch (e) {}
    
    const card = document.createElement('div');
    card.className = 'quick-card';
    card.innerHTML = `
      <div class="name"><span class="icon">${getFileIcon(fileName)}</span>${esc(fileName)}</div>
      <div class="preview">${esc(preview)}</div>
    `;
    card.onclick = () => loadFile(found.path);
    grid.appendChild(card);
  }
  
  if (grid.children.length === 0) {
    grid.innerHTML = '<p style="color:oklch(0.62 0.012 270);font-size:13px;grid-column:1/-1">No quick access files found</p>';
  }
}

function renderRecentFiles() {
  const list = document.getElementById('recentList');
  list.innerHTML = '';
  
  const recent = [...allFiles]
    .filter(f => f.modified > 0)
    .sort((a, b) => b.modified - a.modified)
    .slice(0, 5);
  
  for (const file of recent) {
    const item = document.createElement('div');
    item.className = 'recent-item';
    const relTime = getRelativeTime(file.modified);
    item.innerHTML = `
      <div class="icon">${getFileIcon(file.name)}</div>
      <div class="info">
        <div class="name">${esc(file.name)}</div>
        <div class="meta">${relTime} · ${humanSize(file.size)}</div>
      </div>
    `;
    item.onclick = () => loadFile(file.path);
    list.appendChild(item);
  }
  
  if (recent.length === 0) {
    list.innerHTML = '<p style="color:oklch(0.62 0.012 270);font-size:13px">No recent files</p>';
  }
}

function getRelativeTime(timestamp) {
  const now = Date.now();
  const diff = now - timestamp;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 0) return days === 1 ? '1 day ago' : `${days} days ago`;
  if (hours > 0) return hours === 1 ? '1 hour ago' : `${hours} hours ago`;
  if (minutes > 0) return minutes === 1 ? '1 min ago' : `${minutes} mins ago`;
  return 'just now';
}

async function loadFile(filePath) {
  activeFilePath = filePath;
  updateBreadcrumb(filePath);
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:oklch(0.72 0.012 270)"><p>Loading...</p></div>';

  try {
    const res = await fetch('/api/knowledge/' + encodeURIComponent(filePath), { credentials: 'include' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const wordCount = data.wordCount || 0;
    const meta = '<div class="file-meta">' +
      '<div class="tag">' + esc(data.name) + '</div>' +
      '<div class="tag">' + humanSize(data.size) + '</div>' +
      '<div class="tag">' + new Date(data.modified).toLocaleString() + '</div>' +
      '<div class="tag">' + wordCount.toLocaleString() + ' words</div>' +
    '</div>';

    if (data.ext === '.md') {
      const html = marked.parse(data.content);
      viewer.innerHTML = meta + '<div class="md-content">' + html + '</div>';
      
      viewer.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });
      
      viewer.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => {
          const code = pre.querySelector('code').textContent;
          navigator.clipboard.writeText(code);
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        };
        pre.appendChild(btn);
      });
    } else {
      viewer.innerHTML = meta + '<div class="raw-content">' + esc(data.content) + '</div>';
    }
  } catch (e) {
    viewer.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:oklch(0.72 0.012 270)"><div style="font-size:48px">⚠</div><p>' + esc(e.message) + '</p></div>';
  }
}

function updateBreadcrumb(filePath) {
  const bc = document.getElementById('breadcrumb');
  const parts = filePath.split('/');
  bc.innerHTML = '';
  parts.forEach((p, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    }
    const span = document.createElement('span');
    span.textContent = p;
    bc.appendChild(span);
  });
}

function humanSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Keyboard Shortcuts Handler ───
document.addEventListener('keyboard-shortcut', (e) => {
  const { action } = e.detail;
  
  switch(action) {
    case 'refresh':
      loadTree();
      break;
      
    case 'search':
      const searchInput = document.querySelector('input[type="search"], #search, #filter');
      if (searchInput) {
        searchInput.focus();
        searchInput.select();
      }
      break;
  }
});

loadTree();
console.log('⌨️ Knowledge page keyboard shortcuts registered');
</script>
