<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Rasputin Nexus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 48px;
      max-width: 600px;
    }
    .icon {
      font-size: 96px;
      margin-bottom: 32px;
      opacity: 0.5;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #888;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      padding: 16px 32px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 24px;
      font-size: 14px;
      color: #666;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon pulse">⚡</div>
    <h1>You're Offline</h1>
    <p>
      The Rasputin Nexus Dashboard requires an internet connection to function.<br>
      Please check your network and try again.
    </p>
    <button onclick="location.reload()">Retry Connection</button>
    <div class="status">
      Attempting to reconnect automatically...
    </div>
  </div>

  <script>
    // Auto-retry connection every 5 seconds
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 5000);

    // Listen for online event
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
