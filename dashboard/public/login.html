<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Rasputin Nexus</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated grid background */
    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(96, 165, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96, 165, 250, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }
    
    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
    
    /* Floating particles */
    .particle {
      position: fixed;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.4), transparent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: float 15s ease-in-out infinite;
    }
    
    .particle:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    
    .particle:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 70%;
      left: 80%;
      animation-delay: 3s;
    }
    
    .particle:nth-child(3) {
      width: 60px;
      height: 60px;
      top: 40%;
      left: 5%;
      animation-delay: 6s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(30px, -30px) scale(1.2); opacity: 0.6; }
    }
    
    /* Login container */
    .login-container {
      position: relative;
      z-index: 10;
      background: rgba(15, 15, 20, 0.7);
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 24px;
      padding: 56px 48px;
      width: 420px;
      max-width: 90vw;
      backdrop-filter: blur(40px);
      box-shadow: 
        0 0 60px rgba(96, 165, 250, 0.15),
        0 0 120px rgba(167, 139, 250, 0.1),
        inset 0 0 40px rgba(96, 165, 250, 0.03);
      animation: slideIn 0.6s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Logo */
    .logo-container {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 32px rgba(96, 165, 250, 0.4);
      animation: pulse 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 8px 32px rgba(96, 165, 250, 0.4);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 8px 48px rgba(96, 165, 250, 0.6);
        transform: scale(1.05);
      }
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      color: #888;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    
    /* Auth options */
    .auth-options {
      margin-top: 40px;
    }
    
    /* Google Sign-In Button */
    .google-btn {
      width: 100%;
      padding: 16px 24px;
      background: #ffffff;
      border: none;
      border-radius: 12px;
      color: #3c4043;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }
    
    .google-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .google-icon {
      width: 20px;
      height: 20px;
    }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 32px 0;
      color: #666;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .divider span {
      padding: 0 16px;
    }
    
    /* Hash auth form */
    .hash-auth {
      margin-top: 24px;
    }
    
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e0e0e8;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    
    input:focus {
      border-color: #60a5fa;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }
    
    input::placeholder {
      color: #555;
    }
    
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(96, 165, 250, 0.3);
    }
    
    button[type="submit"]:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(96, 165, 250, 0.4);
    }
    
    button[type="submit"]:active {
      transform: translateY(0);
    }
    
    /* Error message */
    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 8px;
      display: none;
      animation: shake 0.4s;
    }
    
    .error.show {
      display: block;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    /* Footer */
    .footer {
      margin-top: 32px;
      text-align: center;
      color: #555;
      font-size: 12px;
    }
    
    .footer a {
      color: #60a5fa;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .footer a:hover {
      color: #a78bfa;
    }
    
    /* Mobile responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 40px 32px;
      }
      
      h1 {
        font-size: 28px;
      }
      
      .logo {
        width: 80px;
        height: 80px;
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="grid-background"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  
  <!-- Login container -->
  <div class="login-container">
    <div class="logo-container">
      <div class="logo">⚡</div>
      <h1>Rasputin Nexus</h1>
      <p class="subtitle">Neural Command Dashboard</p>
    </div>
    
    <div class="auth-options">
      <!-- Google OAuth -->
      <button class="google-btn" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
      
      <!-- Divider -->
      <div class="divider"><span>or use access key</span></div>
      
      <!-- Hash secret form -->
      <form class="hash-auth" method="POST" action="/auth/login">
        <label for="secret">Access Key</label>
        <input 
          type="password" 
          id="secret" 
          name="secret" 
          placeholder="Enter access key..." 
          autocomplete="current-password"
        >
        <button type="submit">Authenticate</button>
      </form>
      
      <!-- Error message -->
      <div class="error" id="error">
        Authentication failed. Please try again.
      </div>
    </div>
    
    <div class="footer">
      <p>Rasputin Infrastructure · <a href="https://rasputin.to">rasputin.to</a></p>
    </div>
  </div>
  
  <script>
    // Show error if URL has ?fail=1
    if (window.location.search.includes('fail=1')) {
      document.getElementById('error').classList.add('show');
    }
    
    // Show error if URL has ?error=
    if (window.location.search.includes('error=')) {
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const errorEl = document.getElementById('error');
      if (error === 'access_denied') {
        errorEl.textContent = 'Google sign-in was cancelled.';
      } else if (error === 'not_whitelisted') {
        errorEl.textContent = 'Your email is not authorized. Contact admin.';
      } else {
        errorEl.textContent = 'Authentication failed: ' + error;
      }
      errorEl.classList.add('show');
    }
    
    // Google OAuth login
    function loginWithGoogle() {
      // Redirect to Google OAuth endpoint
      window.location.href = '/auth/google';
    }
    
    // Auto-focus access key input
    document.getElementById('secret').focus();
    
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service worker registered:', reg))
          .catch(err => console.error('Service worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
