<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  
  <circle cx="256" cy="256" r="180" stroke="url(#accent)" stroke-width="8" fill="none" opacity="0.3"/>
  
  <g filter="url(#glow)">
    <path d="M156 350 L256 120 L356 350 L256 300 Z" fill="url(#accent)"/>
    <circle cx="256" cy="200" r="35" fill="url(#accent)"/>
  </g>
  
  <circle cx="256" cy="256" r="200" stroke="url(#accent)" stroke-width="4" fill="none" stroke-dasharray="20 10"/>
</svg>
